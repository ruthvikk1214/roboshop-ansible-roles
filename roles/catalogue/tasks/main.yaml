- name: Setup catalogue
  block:
    - name: Disable old NodeJS module
      ansible.builtin.command: dnf module disable nodejs -y
      ignore_errors: true

    - name: Enable NodeJS 20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install NodeJS
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Create roboshop system user
      ansible.builtin.user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: Create app directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: roboshop
        group: roboshop
        mode: '0755'

    - name: Download application code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: Unarchive application code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: Install NodeJS dependencies
      ansible.builtin.npm:
        path: /app

    - name: Copy catalogue service file
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start catalogue service
      ansible.builtin.systemd:
        name: catalogue
        enabled: yes
        state: started

    - name: Copy MongoDB repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: Install MongoDB shell
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: Check if catalogue DB exists
      ansible.builtin.command: >
        mongosh --host "{{ MONGODB_HOST }}" --quiet
        --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output
      changed_when: false

    - name: Load catalogue data if not exists
      ansible.builtin.command: >
        mongosh --host "{{ MONGODB_HOST }}" /app/db/master-data.js
      when: catalogue_output.stdout | int == -1